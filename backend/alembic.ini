# A generic, single database configuration.

[alembic]
# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s
script_location = migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os

# sqlalchemy.url is strictly placeholder here.
# It is overridden at runtime in env.py using pydantic-settings
sqlalchemy.url = sqlite:///../runtime/data/sqlite/agentic_workflow.db

[post_write_hooks]
# Post-write hooks can run tools like ruff after generating migrations

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
